dataset:
  target_column: "Machine failure"
  drop_columns:
    - "UDI"
    - "Product ID"
  test_size: 0.2
  random_state: 42
  stratify: true

feature_engineering:
  sanitize_feature_names: true
  derived_features:
    - "Temperature delta"
    - "Power proxy"
    - "Wear stress proxy"

models:
  xgboost:
    artifact_path: "models/xgboost.pkl"
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    objective: "binary:logistic"
    eval_metric: "logloss"
    random_state: 42
    n_jobs: -1
    scale_pos_weight: "auto"

  random_forest:
    artifact_path: "models/random_forest.pkl"
    n_estimators: 200
    max_depth: 12
    min_samples_split: 5
    min_samples_leaf: 2
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

prediction:
  low_risk_threshold: 0.4
  high_risk_threshold: 0.75

reports:
  metrics_path: "reports/metrics.json"
  shap_summary_path: "reports/figures/shap_summary.png"
  shap_feature_importance_path: "reports/figures/shap_feature_importance.png"
